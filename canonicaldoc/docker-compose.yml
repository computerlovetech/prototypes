services:
  web:
    build: .
    ports:
      - "8000:8000"
    environment:
      - SECRET_KEY=${SECRET_KEY:?set a random SECRET_KEY}
      - BASE_URL=${BASE_URL:-http://localhost:8000}
      - DATABASE_URL=sqlite:////data/canonicaldoc.db
      - EMAIL_ENABLED=${EMAIL_ENABLED:-false}
      - RESEND_API_KEY=${RESEND_API_KEY:-}
      - EMAIL_FROM=${EMAIL_FROM:-CanonicalDoc <login@canonicaldoc.com>}
      - BILLING_ENABLED=${BILLING_ENABLED:-false}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY:-}
      - STRIPE_PRICE_ID=${STRIPE_PRICE_ID:-}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET:-}
      - TRIAL_DAYS=${TRIAL_DAYS:-14}
      - COMP_EMAILS=${COMP_EMAILS:-}
      - COMP_DOMAINS=${COMP_DOMAINS:-}
    volumes:
      - cdoc-data:/data
    restart: unless-stopped

volumes:
  cdoc-data:
