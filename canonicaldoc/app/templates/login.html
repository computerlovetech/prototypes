{% extends "base.html" %}
{% block body %}
<div class="center-card">
  <h1>Sign in</h1>
  <p class="lede">Enter your email and we’ll send you a magic link — no password needed.</p>
  {% if error %}<p class="error">{{ error }}</p>{% endif %}
  <form method="post" action="/login">
    <input type="email" name="email" placeholder="you@company.com" required autofocus>
    <button type="submit">Send me a magic link</button>
  </form>
</div>
{% endblock %}
